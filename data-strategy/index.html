<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Proof of Match · Implementation Pipeline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- React + ReactDOM + Babel (for JSX in-browser) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body style="margin:0;background:#07070f;">
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      // ─── Shared atoms ──────────────────────────────────────────────────────────
      const C = {
        bg:"#07070f", surface:"#0f0f1a", border:"#1e1e38",
        llm:"#a78bfa", det:"#00e5a0", emb:"#38bdf8", comp:"#f5a623", min_:"#ff6b6b",
        text:"#e2e2f0", muted:"#6a6a8a", dim:"#3a3a5a",
      };

      function Badge({ type }) {
        const MAP = {
          LLM:          { bg:"#a78bfa", label:"LLM Prompt" },
          Deterministic:{ bg:"#00e5a0", label:"Deterministic" },
          Embedding:    { bg:"#38bdf8", label:"Embedding Model" },
          Composite:    { bg:"#f5a623", label:"Composite Formula" },
          MinMax:       { bg:"#ff6b6b", label:"min() / max()" },
          SQL:          { bg:"#6c63ff", label:"SQL / Rules" },
        };
        const m = MAP[type] || MAP.LLM;
        return (
          <span style={{ display:"inline-block", fontFamily:"DM Mono,monospace", fontSize:10, padding:"3px 9px", borderRadius:12, background:`${m.bg}18`, color:m.bg, border:`1px solid ${m.bg}40` }}>
            {m.label}
          </span>
        );
      }

      function MethodIcon({ type }) {
        const MAP = { LLM:"⚡", Deterministic:"⚙", Embedding:"🔷", Composite:"∑", MinMax:"min", SQL:"🗄" };
        return <span>{MAP[type] || "?"}</span>;
      }

      function SyntaxCode({ lang, children }) {
        return (
          <div style={{ background:"#050510", border:"1px solid #1e1e38", borderRadius:8, overflow:"hidden", margin:"10px 0" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"6px 14px", borderBottom:"1px solid #1e1e38", background:"#0a0a18" }}>
              <span style={{ fontFamily:"DM Mono,monospace", fontSize:9.5, color:"#3a3a5a", textTransform:"uppercase", letterSpacing:".1em" }}>{lang}</span>
              <div style={{ display:"flex", gap:5 }}>
                {["#ff6b6b","#f5a623","#00e5a0"].map(c=><div key={c} style={{ width:8,height:8,borderRadius:"50%",background:c,opacity:.5 }}/>)}
              </div>
            </div>
            <pre style={{ padding:"14px 16px", fontFamily:"DM Mono,monospace", fontSize:11.5, lineHeight:1.85, color:"#c8c8e8", overflowX:"auto", margin:0 }}>{children}</pre>
          </div>
        );
      }

      function PromptBlock({ system, user }) {
        const [tab, setTab] = useState("system");
        return (
          <div style={{ border:`1px solid ${C.llm}30`, borderRadius:8, overflow:"hidden", margin:"10px 0" }}>
            <div style={{ display:"flex", background:"#0a0a18", borderBottom:`1px solid ${C.llm}20` }}>
              {[["system","System Prompt"],["user","User Prompt Template"]].map(([k,l])=>(
                <button key={k} onClick={()=>setTab(k)}
                  style={{ fontFamily:"DM Mono,monospace", fontSize:10, padding:"7px 14px", border:"none", background:"transparent", color:tab===k?C.llm:C.dim, cursor:"pointer", borderBottom:`2px solid ${tab===k?C.llm:"transparent"}` }}>
                  {l}
                </button>
              ))}
              <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", paddingRight:12 }}>
                <span style={{ fontFamily:"DM Mono,monospace", fontSize:9, color:C.llm }}>⚡ LLM</span>
              </div>
            </div>
            <pre style={{ padding:"14px 16px", fontFamily:"DM Mono,monospace", fontSize:11.5, lineHeight:1.85, color:"#c8c8e8", background:"#050510", overflowX:"auto", margin:0, whiteSpace:"pre-wrap" }}>
              {tab==="system" ? system : user}
            </pre>
          </div>
        );
      }

      function FieldTable({ fields }) {
        return (
          <div style={{ overflowX:"auto", margin:"10px 0" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11.5 }}>
              <thead>
                <tr>{["Field","Type","Source","Required"].map(h=>(
                  <th key={h} style={{ background:"#0a0a18", color:C.dim, padding:"7px 11px", border:`1px solid ${C.border}`, textAlign:"left", fontFamily:"DM Mono,monospace", fontSize:10 }}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {fields.map((f,i)=>(
                  <tr key={i} style={{ background: i%2===0?"#0f0f1a":"#0a0a18" }}>
                    <td style={{ padding:"6px 11px", border:`1px solid ${C.border}`, fontFamily:"DM Mono,monospace", color:"#00e5a0", fontSize:11 }}>{f.name}</td>
                    <td style={{ padding:"6px 11px", border:`1px solid ${C.border}`, color:"#a78bfa", fontFamily:"DM Mono,monospace", fontSize:11 }}>{f.type}</td>
                    <td style={{ padding:"6px 11px", border:`1px solid ${C.border}`, color:C.muted }}>{f.src}</td>
                    <td style={{ padding:"6px 11px", border:`1px solid ${C.border}`, color: f.req?"#00e5a0":C.dim, fontSize:11 }}>{f.req?"✓ required":"optional"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      }

      function OutputBox({ schema, note }) {
        return (
          <div style={{ background:"rgba(0,229,160,.05)", border:"1px solid rgba(0,229,160,.2)", borderRadius:7, padding:"12px 14px", margin:"10px 0" }}>
            <div style={{ fontFamily:"DM Mono,monospace", fontSize:9.5, color:"#00e5a0", textTransform:"uppercase", marginBottom:6 }}>Output Schema</div>
            <pre style={{ fontFamily:"DM Mono,monospace", fontSize:12, color:"#e2e2f0", lineHeight:1.8, margin:0, whiteSpace:"pre-wrap" }}>{schema}</pre>
            {note && <div style={{ fontSize:11.5, color:C.muted, marginTop:8, lineHeight:1.65 }}>{note}</div>}
          </div>
        );
      }

      function UsedIn({ items }) {
        return (
          <div style={{ display:"flex", flexWrap:"wrap", gap:6, margin:"10px 0" }}>
            {items.map(item=>(
              <span key={item} style={{ fontFamily:"DM Mono,monospace", fontSize:10.5, padding:"3px 9px", borderRadius:4, background:"#16162a", color:C.text, border:`1px solid ${C.border}` }}>
                → {item}
              </span>
            ))}
          </div>
        );
      }

      function PocProd({ poc, prod }) {
        const [view, setView] = useState("poc");
        return (
          <div style={{ border:`1px solid ${C.border}`, borderRadius:8, overflow:"hidden", margin:"10px 0" }}>
            <div style={{ display:"flex", background:"#0a0a18", borderBottom:`1px solid ${C.border}` }}>
              {[["poc","🧪 POC"],["prod","🏭 Production"]].map(([k,l])=>(
                <button key={k} onClick={()=>setView(k)}
                  style={{ fontFamily:"DM Mono,monospace", fontSize:10.5, padding:"7px 16px", border:"none", background:"transparent", color:view===k?C.text:C.dim, cursor:"pointer", borderBottom:`2px solid ${view===k?"#f5a623":"transparent"}`, transition:"all .12s" }}>
                  {l}
                </button>
              ))}
            </div>
            <div style={{ padding:"14px 16px", background:"#050510", fontSize:12, color:C.muted, lineHeight:1.78 }}>
              {view==="poc" ? poc : prod}
            </div>
          </div>
        );
      }

      function ScoreShell({ tag, name, method, def, children }) {
        return (
          <div>
            <div style={{ display:"flex", alignItems:"flex-start", gap:12, marginBottom:16 }}>
              <div>
                <div style={{ fontFamily:"DM Mono,monospace", fontSize:9.5, color:C.muted, textTransform:"uppercase", letterSpacing:".12em", marginBottom:4 }}>{tag}</div>
                <h2 style={{ fontFamily:"Syne,sans-serif", fontSize:22, fontWeight:700, color:C.text, lineHeight:1.2, marginBottom:8 }}>{name}</h2>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                  <Badge type={method} />
                </div>
              </div>
            </div>
            <div style={{ background:"#0f0f1a", border:`1px solid ${C.border}`, borderRadius:8, padding:"12px 15px", marginBottom:16, fontSize:13, color:C.muted, lineHeight:1.75 }}>
              <span style={{ color:C.text, fontFamily:"Syne,sans-serif", fontWeight:700 }}>Definition: </span>{def}
            </div>
            {children}
          </div>
        );
      }

      function TwoCol({ children }) {
        return <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>{children}</div>;
      }

      function Sub({ text }) {
        return <div style={{ fontFamily:"DM Mono,monospace", fontSize:9.5, color:C.muted, textTransform:"uppercase", letterSpacing:".1em", margin:"14px 0 7px" }}>{text}</div>;
      }

      // ─── PIPELINE OVERVIEW ───────────────────────────────────────────────
      function PipelinePanel({ goTab }) {
        const agents = [
          { id:"a1", label:"Agent 1", sub:"Individual Enrichment", color:"#a78bfa", scores:["credibility_score","fin_ready_score","ops_ready_score","tags","mandate_summary"], note:"Runs ONCE per attendee. Results cached. All pairwise agents read from cache.", cache:true },
          { id:"a2", label:"Agent 2", sub:"Pairwise Scoring", color:"#38bdf8", scores:["PersonaFit(A,B)","ThematicFit(A,B)","IntentOverlap(A,B)","ComplementaryScore(A,B)","NonObviousnessScore(A,B)","CredibilityScore(A,B)","FinancialReady=min()","OpsReady=min()"], note:"Runs per directed pair. Reads individual scores from cache.", cache:false },
          { id:"a3", label:"Agent 3", sub:"Scoring Engine", color:"#00e5a0", scores:["MatchScore = Σ(w×component)","RankScore = MS×(1+α×DR_B+β×DR_A)"], note:"Persona-aware weights. Different α/β/γ per persona type.", cache:false },
          { id:"a4", label:"Agent 4", sub:"Bucket Assignment", color:"#f5a623", scores:["P1: MS≥0.70 AND FR≥0.70","PILOT: MS≥0.70 AND OR≥0.65 AND FR<0.70","P2: MS≥0.65 AND max(FR,OR)≥0.40","P3: MS≥0.40"], note:"Pure rules. No ML. Can be SQL CASE WHEN.", cache:false },
        ];
        const tools = [
          { step:"Registration", tool:"Google Forms / Typeform / Custom", color:"#6c63ff", inputs:"free-text bio, tags, intent, stage, mandate" },
          { step:"Enrichment APIs", tool:"LinkedIn API · Crunchbase · X/Twitter", color:"#38bdf8", inputs:"company data, funding history, connections" },
          { step:"LLM Scoring", tool:"Claude API / GPT-4o (Agent 1 & 2)", color:"#a78bfa", inputs:"credibility, fin_ready, ops_ready, intent extraction" },
          { step:"Embedding Model", tool:"text-embedding-3-large / BGE-M3", color:"#00e5a0", inputs:"NonObviousnessScore, IntentOverlap cosine sim" },
          { step:"Vector Store", tool:"Pinecone / pgvector / Weaviate", color:"#ff6b6b", inputs:"Store profile embeddings, cosine similarity lookup" },
          { step:"Cache Layer", tool:"Redis / Postgres", color:"#f5a623", inputs:"Individual scores cached per attendee_id" },
          { step:"Scoring DB", tool:"Postgres / DuckDB", color:"#6c63ff", inputs:"Pairwise scores, bucket assignment, RankScore" },
          { step:"Dashboard", tool:"Next.js + Supabase / Retool", color:"#00e5a0", inputs:"Organizer view, match cards, CTA generation" },
        ];

        const stageNote = [
          ["fin_ready_score","Agent 1","Stage is a CONTEXT INPUT to the LLM prompt — not a direct weight. 'Series A' lowers fin_ready if not actively raising."],
          ["credibility_score","Agent 1","Stage mentioned in rubric context. High-traction Seed > low-traction Series B."],
          ["C-set pre-filter","Agent 2","Optional: stage can gate minimum eligibility for high-value pools (e.g. min Series A for P1 pool)."],
          ["MatchScore","NOT used","Stage does not appear in any MatchScore weight vector."],
          ["Bucket Assignment","NOT used","Bucket is driven by FinancialReady and OpsReady only — stage is never a bucket gate."],
        ];

        return (
          <div>
            <div style={{ fontFamily:"DM Mono,monospace", fontSize:9.5, color:"#00e5a0", textTransform:"uppercase", letterSpacing:".18em", marginBottom:6 }}>Implementation Pipeline</div>
            <h2 style={{ fontFamily:"Syne,sans-serif", fontSize:24, fontWeight:700, color:C.text, marginBottom:6 }}>Full Pipeline — Agents, Tools, Data Flow</h2>
            <p style={{ fontSize:13, color:C.muted, lineHeight:1.75, marginBottom:22 }}>Click any score chip to jump to its detailed implementation. Each box shows the agent, its tool stack, and what it outputs.</p>

            <div style={{ position:"relative", marginBottom:28 }}>
              {agents.map((a, i)=>(
                <div key={a.id} style={{ display:"flex", gap:14 }}>
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"center", width:40, flexShrink:0 }}>
                    <div style={{ width:36, height:36, borderRadius:"50%", background:`${a.color}18`, border:`2px solid ${a.color}60`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                      <span style={{ fontFamily:"Syne,sans-serif", fontSize:11, fontWeight:800, color:a.color }}>A{i+1}</span>
                    </div>
                    {i<agents.length-1 && <div style={{ width:2, height:24, background:`${a.color}30`, margin:"4px 0" }}/>}
                  </div>
                  <div style={{ background:`${a.color}06`, border:`1px solid ${a.color}25`, borderRadius:10, padding:"14px 16px", flex:1, marginBottom: i<agents.length-1?8:0 }}>
                    <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:8 }}>
                      <div style={{ fontFamily:"Syne,sans-serif", fontSize:14, fontWeight:700, color:a.color }}>{a.label} — {a.sub}</div>
                      {a.cache && <span style={{ fontFamily:"DM Mono,monospace", fontSize:9.5, color:"#f5a623", background:"rgba(245,166,35,.08)", border:"1px solid rgba(245,166,35,.25)", borderRadius:4, padding:"1px 7px" }}>CACHED OUTPUT</span>}
                    </div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginBottom:8 }}>
                      {a.scores.map(s=>(
                        <span key={s} style={{ fontSize:11, padding:"3px 9px", borderRadius:4, background:"#16162a", color:C.muted, border:`1px solid ${C.border}`, fontFamily:"DM Mono,monospace", cursor:"default" }}>{s}</span>
                      ))}
                    </div>
                    <div style={{ fontSize:11.5, color:C.muted }}>{a.note}</div>
                  </div>
                </div>
              ))}
            </div>

            <div style={{ fontFamily:"DM Mono,monospace", fontSize:9.5, color:"#4a4a6a", textTransform:"uppercase", letterSpacing:".12em", marginBottom:12 }}>Tool Stack</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginBottom:24 }}>
              {tools.map(t=>(
                <div key={t.step} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"12px 13px" }}>
                  <div style={{ fontFamily:"DM Mono,monospace", fontSize:9, color:t.color, textTransform:"uppercase", marginBottom:4 }}>{t.step}</div>
                  <div style={{ fontFamily:"Syne,sans-serif", fontSize:11.5, fontWeight:700, color:C.text, marginBottom:5 }}>{t.tool}</div>
                  <div style={{ fontSize:10.5, color:C.muted, lineHeight:1.55 }}>{t.inputs}</div>
                </div>
              ))}
            </div>

            <div style={{ fontFamily:"DM Mono,monospace", fontSize:9.5, color:"#f5a623", textTransform:"uppercase", letterSpacing:".12em", marginBottom:10 }}>Stage Flag — Where It Is (and Is Not) Used</div>
            <div style={{ border:`1px solid rgba(245,166,35,.2)`, borderRadius:8, overflow:"hidden" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <thead>
                  <tr>{["Score","Agent","Stage Flag Role"].map(h=><th key={h} style={{ background:"#0a0a18", color:C.dim, padding:"8px 12px", border:`1px solid ${C.border}`, textAlign:"left", fontFamily:"DM Mono,monospace", fontSize:10 }}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {stageNote.map(([score,agent,note],i)=>(
                    <tr key={i} style={{ background: i%2===0?"#0f0f1a":"#0a0a18" }}>
                      <td style={{ padding:"8px 12px", border:`1px solid ${C.border}`, fontFamily:"DM Mono,monospace", color: score.startsWith("Match")||score.startsWith("Bucket")?"#ff6b6b":"#00e5a0", fontSize:11 }}>{score}</td>
                      <td style={{ padding:"8px 12px", border:`1px solid ${C.border}`, color:"#a78bfa", fontFamily:"DM Mono,monospace", fontSize:11 }}>{agent}</td>
                      <td style={{ padding:"8px 12px", border:`1px solid ${C.border}`, color:C.muted }}>{note}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div style={{ background:"rgba(245,166,35,.06)", border:"1px solid rgba(245,166,35,.2)", borderRadius:7, padding:"12px 15px", marginTop:12, fontSize:12.5, color:C.muted, lineHeight:1.75 }}>
              <span style={{ color:"#f5a623" }}>◆ Stage flag key rule: </span>Stage (Seed/Series A/Series B etc.) is a CONTEXT signal fed into LLM prompts for fin_ready and credibility scoring. It is <strong style={{ color:C.text }}>never</strong> a direct weight in MatchScore and <strong style={{ color:C.text }}>never</strong> a gate in bucket assignment. Actual traction signals (institutional clients, audited code, live product) are what determine scores — not stage labels.
            </div>
          </div>
        );
      }

      // ─── CREDIBILITY SCORE ───────────────────────────────────────────────
      function CredPanel() {
        return (
          <ScoreShell tag="Agent 1 · Individual Enrichment" name="CredibilityScore" method="LLM"
            def="A normalized quality signal (0–1) computed once per attendee. Measures how credible this person is in their stated role, using verifiable signals. Different rubric per persona type. Averaged for a pair in Agent 2.">
            <Sub text="Input Fields — Agent 1 Enrichment" />
            <FieldTable fields={[
              { name:"persona_type", type:"enum", src:"Registration form", req:true },
              { name:"stage", type:"string", src:"Registration / Crunchbase", req:false },
              { name:"aum_deployed", type:"string", src:"Registration / LinkedIn", req:false },
              { name:"fund_vintage", type:"int", src:"Registration / Crunchbase", req:false },
              { name:"institutional_clients", type:"list[string]", src:"Registration / LinkedIn", req:false },
              { name:"audit_status", type:"string", src:"Registration (free-text)", req:false },
              { name:"revenue_arr", type:"string", src:"Registration / Crunchbase", req:false },
              { name:"traction_signals", type:"list[string]", src:"Registration free-text", req:true },
              { name:"regulatory_programs", type:"list[string]", src:"Registration / LinkedIn", req:false },
            ]} />
            <Sub text="LLM Implementation" />
            <PromptBlock
              system={`You are a credibility evaluator for an institutional finance event matching system.
Score this attendee's credibility on a 0.00–1.00 scale based ONLY on verifiable signals.

RUBRIC BY PERSONA TYPE:

INVESTOR rubric (weight order):
  1. AUM actively earmarked + deployment track record (0.30)
  2. Deals closed in this specific vertical in past 24 months (0.25)
  3. Fund vintage — recent funds in deployment window score higher (0.20)
  4. Portfolio quality and follow-on capacity (0.15)
  5. GP reputation / institutional backing (0.10)

FOUNDER rubric (weight order):
  1. Institutional clients (named banks, asset managers, funds) (0.30)
  2. Audited code / security reviews from known auditors (0.25)
  3. Revenue / ARR — hard numbers preferred over estimates (0.20)
  4. Live product in production (not testnet/MVP) (0.15)
  5. Pilot contracts or MoUs with named institutions (0.10)

REGULATOR rubric (weight order):
  1. Institution seniority (G7 central bank > regional regulator) (0.30)
  2. Active sandbox programs or published guidance (0.25)
  3. MoU history or formal pilot engagements (0.25)
  4. Working group membership (0.20)

IMPORTANT:
- Stage label (Seed, Series A, etc.) is CONTEXT only — it does NOT directly determine score.
- A Seed company with 2 named enterprise clients and a Trail of Bits audit outscores
  a Series B with no verifiable traction.
- Return ONLY a JSON object. No preamble.`}
              user={`Attendee profile:
persona_type: {persona_type}
stage: {stage}
bio_free_text: {bio}
traction_signals: {traction_signals}
institutional_clients: {institutional_clients}
audit_status: {audit_status}
aum_or_revenue: {aum_or_revenue}
fund_vintage: {fund_vintage}

Return JSON:
{
  "credibility_score": <float 0.00-1.00>,
  "signals_found": [<list of signals that drove the score>],
  "missing_signals": [<list of signals absent that would have raised the score>],
  "reasoning": "<1-2 sentence explanation>"
}`} />
            <TwoCol>
              <div>
                <Sub text="Output Schema" />
                <OutputBox schema={`{
  "credibility_score": 0.84,
  "signals_found": [
    "Live with European banks (2 named)",
    "Audited contracts (Trail of Bits)",
    "$40M Series B validated"
  ],
  "missing_signals": ["Revenue ARR not provided"],
  "reasoning": "Strong institutional traction and audit..."
}`} note="credibility_score cached in attendee record. Used in Agent 2 as avg(cred_A, cred_B)." />
                <Sub text="When Used" />
                <UsedIn items={["Agent 2: CredibilityScore(A,B) = avg(cred_A, cred_B)","MatchScore: 10% weight for all persona types","Dashboard: shown as trust signal on match card"]} />
              </div>
              <div>
                <Sub text="POC vs Production" />
                <PocProd
                  poc={<span>Run LLM call per attendee at registration time. Store result in a simple Postgres column <code style={{ color:"#00e5a0" }}>attendees.credibility_score FLOAT</code>. Use Claude claude-sonnet-4-6 with temperature=0 for determinism. ~50–200 tokens per call. <br/><br/>Cost estimate: 500 attendees × ~500 tokens = ~250K tokens ≈ $0.75 at Sonnet pricing.</span>}
                  prod={<span>Async enrichment worker (Celery/Bull queue). Re-score on profile update event. Store in enriched_profiles table with score_version and scored_at timestamp. A/B test prompt versions. Add confidence interval via 3-sample majority vote for high-stakes decisions. Cache invalidation on Crunchbase/LinkedIn webhook updates.</span>}
                />
              </div>
            </TwoCol>
          </ScoreShell>
        );
      }

      // ─── FIN_READY + OPS_READY (Individual) ─────────────────────────────
      function ReadyPanel() {
        const [view, setView] = useState("fin");
        return (
          <div>
            <div style={{ display:"flex", gap:8, marginBottom:20 }}>
              {[["fin","fin_ready_score"],["ops","ops_ready_score"]].map(([k,l])=>(
                <button key={k} onClick={()=>setView(k)}
                  style={{ fontFamily:"DM Mono,monospace", fontSize:11, padding:"7px 14px", borderRadius:6, border:`1px solid ${view===k?"#00e5a0":C.border}`, background:view===k?"rgba(0,229,160,.08)":C.surface, color:view===k?"#00e5a0":C.dim, cursor:"pointer" }}>
                  {l}
                </button>
              ))}
            </div>

            {view==="fin" ? (
              <ScoreShell tag="Agent 1 · Individual Enrichment" name="fin_ready_score (individual)" method="LLM"
                def="How financially ready is this specific attendee to execute a capital transaction in the next 6–12 months? Measures willingness + capacity to deploy or receive capital — NOT whether a pairwise match is ready (that is FinancialReady = min(), computed in Agent 2).">
                <Sub text="Input Fields" />
                <FieldTable fields={[
                  { name:"persona_type", type:"enum", src:"Registration", req:true },
                  { name:"fundraising_status", type:"string", src:"Registration free-text", req:true },
                  { name:"check_size_range", type:"string", src:"Registration", req:false },
                  { name:"deployment_timeline", type:"string", src:"Registration", req:false },
                  { name:"capital_constraints", type:"string", src:"Registration free-text", req:false },
                  { name:"stage", type:"string", src:"Registration / Crunchbase", req:false },
                  { name:"mandate_type", type:"string", src:"Registration", req:true },
                ]} />
                <Sub text="LLM Implementation" />
                <PromptBlock
                  system={`You evaluate financial transaction readiness for event matching.

                <SyntaxCode lang="python">{`from typing import set

def jaccard(a: set, b: set) -> float:
    if not a and not b: return 0.0
    return len(a & b) / len(a | b)

def thematic_fit(
    profile_a: dict,
    profile_b: dict,
    dim_weights: dict = None
) -> float:
    """
    Weighted Jaccard across three tag dimensions.
    Regulatory tags weighted higher for regulator personas.
    """
    weights = dim_weights or {
        "vertical":   0.50,
        "regulatory": 0.35,
        "geo":        0.15,
    }

    scores = {}
    for dim, w in weights.items():
        tags_a = set(profile_a.get(f"{dim}_tags", []))
        tags_b = set(profile_b.get(f"{dim}_tags", []))
        scores[dim] = jaccard(tags_a, tags_b)

    tf = sum(weights[d] * scores[d] for d in weights)
    return round(tf, 4)

# Example: Amara × James
# vertical:   {infra} / {L2, compliance, KYC, AML, infra} → 1/6 ≈ 0.17
# regulatory: {} / {MiCA, CBDC} → 0/2 = 0.00
# geo:        {UAE} / {EU} → 0.0
# Weighted: 0.50×0.17 + 0.35×0.00 + 0.15×0.0 ≈ 0.09
# After LLM boost for regulatory relevance → ~0.55`}</SyntaxCode>

                <SyntaxCode lang="python">{`from sentence_transformers import SentenceTransformer
import numpy as np

model = SentenceTransformer("BAAI/bge-small-en-v1.5")

def tag_cosine_sim(tags_a: list, tags_b: list) -> float:
    """
    Encode tag lists as averaged embeddings.
    Better than Jaccard for semantically related tags
    (e.g. 'custody' vs 'settlement' are related but
     Jaccard gives 0).
    """
    if not tags_a or not tags_b:
        return 0.0
    emb_a = model.encode(" ".join(tags_a))
    emb_b = model.encode(" ".join(tags_b))
    return float(np.dot(emb_a, emb_b) / 
                (np.linalg.norm(emb_a) * np.linalg.norm(emb_b)))`}</SyntaxCode>

def intent_overlap(intent_a: str, intent_b: str) -> float:

                <SyntaxCode lang="python">{`def complementary_score(
    pf: float,   # PersonaFit
    io: float,   # IntentOverlap
    tf: float,   # ThematicFit
) -> float:
    """
    Weighted composite of structural + explicit + thematic signals.
    Used both as:
    1. Input to MatchScore (15% weight)
    2. Primary C-set candidate filter
    """
    weights = {"pf": 0.40, "io": 0.35, "tf": 0.25}
    score = weights["pf"]*pf + weights["io"]*io + weights["tf"]*tf
    return round(score, 4)

# C-set generation: filter pairs by ComplementaryScore
C_SET_THRESHOLD = 0.60  # tune based on event size

def build_c_set(
    attendees: list,
    scores: dict,
    threshold: float = C_SET_THRESHOLD
) -> list:
    """
    Build high-precision candidate pool.
    Pre-filters by PersonaFit ≥ 0.50 to avoid
    scoring clearly incompatible pairs.
    """
    c_set = []
    for a in attendees:
        for b in attendees:
            if a.id == b.id: continue
            pf = persona_fit(a.type, b.type)
            if pf < 0.50: continue   # pre-filter
            tf = thematic_fit(a, b)
            if tf < 0.10: continue   # minimal topic overlap
            io = intent_overlap(a.intent, b.intent)
            cs = complementary_score(pf, io, tf)
            if cs >= threshold:
                c_set.append((a.id, b.id, cs))
    return sorted(c_set, key=lambda x: -x[2])

# CS = 0.40×0.90 + 0.35×0.95 + 0.25×0.88 = 0.92

# CS = 0.40×0.85 + 0.35×0.62 + 0.25×0.55 = 0.69
# → borderline, may enter via N-set instead`}</SyntaxCode>

from openai import OpenAI
client = OpenAI()

def generate_profile_embedding(profile: dict) -> list[float]:
    """
    Encode the full enriched profile as a problem-space embedding.
    Not just bio — include vertical, customers, use-cases, competitors.
    Goal: capture the PROBLEM being solved, not the stated intent.
    """
    problem_space_text = f"""
    Role: {profile['role']}
    Organization: {profile['org']}
    Industry vertical: {', '.join(profile.get('vertical_tags', []))}
    Regulatory context: {', '.join(profile.get('regulatory_tags', []))}
    Target customers: {profile.get('target_customers', '')}
    Core use-cases: {profile.get('use_cases', '')}
    Key technology: {profile.get('tech_stack', '')}
    Problem being solved: {profile.get('bio', '')}
    """.strip()

    response = client.embeddings.create(
        model="text-embedding-3-large",
        input=problem_space_text
    )
    return response.data[0].embedding  # 3072-dim vector`}</SyntaxCode>
                <Sub text="NonObviousnessScore Calculation (Agent 2)" />
                <SyntaxCode lang="python">{`import numpy as np

def cosine_sim(a: list, b: list) -> float:
    a, b = np.array(a), np.array(b)
    return float(np.dot(a, b) / (np.linalg.norm(a) * np.linalg.norm(b)))

def tag_overlap_penalty(tags_a: list, tags_b: list) -> float:
    """
    Jaccard similarity of ALL tags as penalty signal.
    High overlap = the match is obvious = penalize discovery score.
    """
    a, b = set(tags_a), set(tags_b)
    if not a and not b: return 0.0
    return len(a & b) / len(a | b)

def non_obviousness_score(
    embed_a: list,
    embed_b: list,
    tags_a: list,
    tags_b: list,
    penalty_weight: float = 0.8
) -> float:
    """
    semantic_sim × (1 - penalty_weight × tag_overlap)
    
    High when: problem-spaces similar AND tags different
    Low when:  tags already overlap heavily (obvious match)
    """
    sem_sim = cosine_sim(embed_a, embed_b)
    # Normalize cosine to 0-1 range
    sem_sim = max(0.0, sem_sim)
    
    penalty = tag_overlap_penalty(tags_a, tags_b)
    no_score = sem_sim * (1 - penalty_weight * penalty)
    return round(max(0.0, no_score), 4)

# Amara × James:
# sem_sim ≈ 0.72 (both in institutional DeFi infra space)
# tag_overlap ≈ 0.14 (only {infra, institutional} shared)
# penalty = 0.8 × 0.14 = 0.11
# NO = 0.72 × (1 - 0.11) ≈ 0.64 → normalized to ~0.55

# Amara × Marcus:
# sem_sim ≈ 0.88 (very similar sectors)
# tag_overlap ≈ 0.50 (RWA, infra, institutional, custody)
# penalty = 0.8 × 0.50 = 0.40
# NO = 0.88 × (1 - 0.40) ≈ 0.53 → suppressed to ~0.12`}</SyntaxCode>

                <SyntaxCode lang="python">{`N_SET_THRESHOLD = 0.40

def build_n_set(attendees, threshold=N_SET_THRESHOLD):
    """
    N-set: discovery matches where NO fires.
    Looser filter — crosses vertical boundaries.
    """
    n_set = []
    for a in attendees:
        for b in attendees:
            if a.id == b.id: continue
            no = non_obviousness_score(
                a.profile_embedding,
                b.profile_embedding,
                a.all_tags, b.all_tags
            )
            if no >= threshold:
                n_set.append((a.id, b.id, no))
    return sorted(n_set, key=lambda x: -x[2])`}</SyntaxCode>

              method="MinMax"
              def={view==="fin"
                ? "The pairwise capital transaction readiness score — the MINIMUM of both individual fin_ready scores. If one side is not ready to transact capital, the pair is not ready regardless of the other side. Used in RankScore (γ=fin) and P1/PILOT bucket gates."
                : "The pairwise pilot/sandbox readiness score — the MINIMUM of both individual ops_ready scores. If one side lacks operational capacity for a pilot, the pair cannot execute one. Used in RankScore (γ=ops) and PILOT bucket gate."}>

                  <Sub text="Implementation (Python)" />
                  <SyntaxCode lang="python">{`def financial_ready(fin_a: float, fin_b: float) -> float:
    """
    Pairwise capital readiness = min of both individual scores.
    Logic: capital transaction requires BOTH parties ready.
    The weaker side determines the pair's readiness.
    """
    return round(min(fin_a, fin_b), 4)

def operational_ready(ops_a: float, ops_b: float) -> float:
    """
    Pairwise pilot readiness = min of both.
    Same logic: a pilot requires both parties operationally capable.
    """
    return round(min(ops_a, ops_b), 4)

# Computed independently — NEVER averaged or combined
# before bucket assignment.

# Amara × James:
# FR = min(0.91, 0.55) = 0.55   ← James pulls it down
# OR = min(0.70, 0.82) = 0.70   ← Amara limits it

# Amara × Marcus:
# FR = min(0.91, 0.90) = 0.90   ← both ready
# OR = min(0.70, 0.75) = 0.70   ← Amara limits it`}</SyntaxCode>
                  <Sub text="SQL Implementation (Production)" />
                  <SyntaxCode lang="sql">{`-- Compute pairwise DealReady scores in one pass
SELECT
  a.id       AS attendee_a_id,
  b.id       AS attendee_b_id,
  LEAST(a.fin_ready_score, b.fin_ready_score) AS financial_ready,
  LEAST(a.ops_ready_score, b.ops_ready_score) AS ops_ready
FROM attendees a
JOIN attendees b ON a.id < b.id  -- avoid duplicates
WHERE a.event_id = b.event_id
  AND a.id != b.id;`}</SyntaxCode>

{

  "ops_ready": 0.70,          // min(0.70, 0.82) — Amara limits
  "limiting_party_fin": "james",
  "limiting_party_ops": "amara"
}

// Amara × Marcus
{
  "financial_ready": 0.90,  // both financially ready
  "ops_ready": 0.70,         // Amara is operational limit
}`} note="These two values are NEVER merged, averaged, or compared before bucket assignment. They flow independently to: (1) RankScore via γ, (2) Bucket rules separately." />

                    <span style={{ color:"#ff6b6b" }}>⚠ </span>FinancialReady and OperationalReady must remain independent columns through all pipeline stages. Averaging them (e.g. DealReady = avg(FR, OR)) would cause a pair with FR=0.10 and OR=0.90 to score avg=0.50 — appearing mid-range when the correct bucket is PILOT (ops-ready, not capital-ready).

                <Sub text="Implementation (Python)" />
                <SyntaxCode lang="python">{`# Persona-specific weight vectors (from source W_DATA)
MATCH_WEIGHTS = {
    "investor": {
        "pf": 0.30, "io": 0.25, "tf": 0.20,
        "comp": 0.15, "no": 0.00, "cred": 0.10
    },
    "founder": {
        "pf": 0.25, "io": 0.25, "tf": 0.20,
        "comp": 0.15, "no": 0.05, "cred": 0.10
    },
    "regulator": {
        "pf": 0.20, "io": 0.30, "tf": 0.30,
        "comp": 0.10, "no": 0.00, "cred": 0.10
    },
}

def match_score(
    components: dict,
    persona_type: str  # persona type of A (the requester)
) -> float:
    """
    Weighted sum of 6 components.
    persona_type = the persona whose perspective we're scoring from.
    """
    w = MATCH_WEIGHTS[persona_type.lower()]
    score = (
        w["pf"]   * components["persona_fit"] +
        w["io"]   * components["intent_overlap"] +
        w["tf"]   * components["thematic_fit"] +
        w["comp"] * components["complementary_score"] +
        w["no"]   * components["non_obviousness"] +
        w["cred"] * components["credibility_score"]
    )
    return round(score, 4)`}</SyntaxCode>

                  { name:"ops_ready_self", type:"float", src:"Agent 1 individual score", req:true },
                  { name:"alpha", type:"float", src:"Persona config", req:true },

                <Sub text="Implementation (Python)" />
                <SyntaxCode lang="python">{`# Persona RankScore configs (α, β, γ)
RANK_CONFIG = {
    "investor":  {"alpha": 0.60, "beta": 0.05, "gamma": "fin"},
    "founder":   {"alpha": 0.50, "beta": 0.10, "gamma": "max"},
    "regulator": {"alpha": 0.20, "beta": 0.05, "gamma": "ops"},
}

def select_deal_ready(
    fr: float, ops: float, gamma: str
) -> float:
    """γ selects which DealReady dimension to use."""
    if gamma == "fin":  return fr
    if gamma == "ops":  return ops
    return max(fr, ops)  # "max" for founders

def rank_score(
    ms: float,
    fr_pair: float, ops_pair: float,  # pairwise
    fr_self: float, ops_self: float,  # individual
    persona_type: str
) -> float:
    cfg = RANK_CONFIG[persona_type]
    alpha, beta, gamma = cfg["alpha"], cfg["beta"], cfg["gamma"]

    # DealReady_B = counterparty readiness
    dr_b = select_deal_ready(fr_pair, ops_pair, gamma)
    # DealReady_A = self readiness
    dr_a = select_deal_ready(fr_self, ops_self, gamma)

    rs = ms * (1 + alpha * dr_b + beta * dr_a)
    return round(rs, 4)`}</SyntaxCode>

  "alpha": 0.60, "beta": 0.05, "gamma": "fin",
  "rank_position": 1
}`} note="RankScore can exceed 1.0 — it's a ranking key, not a probability. Used for ordering within bucket only." />

            def="Pure deterministic rules applied to MatchScore, FinancialReady, and OperationalReady. No ML. Evaluated in order — first rule that matches wins. Stage flag is NOT used here.">
            <TwoCol>
              <div>
                <Sub text="Input Fields" />

                  { name:"match_score", type:"float", src:"Agent 3", req:true },

                ]} />
                <Sub text="Python Implementation" />
                <SyntaxCode lang="python">{`from enum import Enum

class Bucket(str, Enum):
    P1     = "P1"
    PILOT  = "PILOT"
    P2     = "P2"
    P3     = "P3"

def assign_bucket(
    ms: float,
    fr: float,
    ops: float
) -> Bucket:
    if ms >= 0.70 and fr >= 0.70:
        return Bucket.P1
    if ms >= 0.70 and ops >= 0.65 and fr < 0.70:
        return Bucket.PILOT
    if ms >= 0.65 and max(fr, ops) >= 0.40:
        return Bucket.P2
    if ms >= 0.40:
        return Bucket.P3
    return None`}</SyntaxCode>

              <div>
                <Sub text="SQL Implementation" />
                <SyntaxCode lang="sql">{`CREATE MATERIALIZED VIEW match_buckets AS
SELECT
  pair_id,
  attendee_a_id,
  attendee_b_id,
  match_score,
  financial_ready,
  ops_ready,
  rank_score,
  CASE
    WHEN match_score >= 0.70 
      AND financial_ready >= 0.70
    THEN 'P1'
    WHEN match_score >= 0.70
      AND ops_ready >= 0.65
      AND financial_ready < 0.70
    THEN 'PILOT'
    WHEN match_score >= 0.65
      AND GREATEST(financial_ready, ops_ready) >= 0.40
    THEN 'P2'
    WHEN match_score >= 0.40
    THEN 'P3'
    ELSE 'EXCLUDED'
  END AS bucket;`}</SyntaxCode>

              </div>
            </TwoCol>
          </ScoreShell>
        );
      }

                {TABS.map(t=>(
                  <button key={t.id} onClick={()=>setTab(t.id)}
                    style={{ fontFamily:"DM Mono,monospace", fontSize:10, padding:"8px 12px", border:"none", background:"transparent", color:tab===t.id?"#00e5a0":C.dim, cursor:"pointer", borderBottom:`2px solid ${tab===t.id?"#00e5a0":"transparent"}`, whiteSpace:"nowrap", transition:"color .12s", flexShrink:0 }}>
                    {t.label}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ maxWidth:980, margin:"0 auto", padding:"28px 36px 80px" }}>
              {panels[tab]}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
